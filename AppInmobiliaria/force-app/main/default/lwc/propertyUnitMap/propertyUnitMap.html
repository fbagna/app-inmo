<template>
    <lightning-card title={labels.cardTitle} icon-name="standard:location">
        <template if:true={mapMarkers}>
            <div class="slds-p-around_x-small">
                <lightning-map
                    map-markers={mapMarkers}
                    zoom-level="15">
                </lightning-map>
            </div>
        </template>
        <template if:false={mapMarkers}>
            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                {labels.searchingText}
            </div>
        </template>
    </lightning-card>
</template>
