<template>
    <lightning-card title="Mapa de Inmuebles Disponibles" icon-name="standard:location">
        <template if:true={mapMarkers}>
            <div class="contenedor-mapa">
                <lightning-map 
                    map-markers={mapMarkers} 
                    zoom-level="12"
                    list-view="visible">
                </lightning-map>
            </div>
        </template>
        <template if:false={mapMarkers}>
            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                Buscando ubicaciones...
            </div>
        </template>
    </lightning-card>
</template>
