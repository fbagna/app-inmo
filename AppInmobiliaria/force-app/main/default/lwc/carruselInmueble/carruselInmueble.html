<template>
    <lightning-card title={label.Carousel_Title} icon-name="standard:photo">
        <div class="slds-p-around_medium">
            <template if:true={tieneFotos}>
                <lightning-carousel disable-auto-refresh>
                    <template for:each={fotos} for:item="foto">
                        <lightning-carousel-image
                            key={foto.id}
                            src={foto.url}
                            header={foto.titulo}
                            alt={foto.titulo}>
                        </lightning-carousel-image>
                    </template>
                </lightning-carousel>
            </template>
            <template if:false={tieneFotos}>
                <div class="slds-text-align_center slds-text-color_weak slds-p-around_medium">
                    {label.Carousel_No_Photos}
                </div>
            </template>
        </div>
    </lightning-card>
</template>
