<template>
    <lightning-card title="Acciones Rápidas" icon-name="standard:apps">
        
        <div class="slds-m-around_medium slds-grid slds-wrap slds-gutters slds-grid_align-center">
            <div class="slds-col slds-p-bottom_medium">
                <button class="btn-lanzadera" onclick={navNuevoEdificio}><lightning-icon icon-name="custom:custom24" size="large"></lightning-icon><span class="btn-text">Nuevo Edificio</span></button>
            </div>
            <div class="slds-col slds-p-bottom_medium">
                <button class="btn-lanzadera" onclick={navNuevoInmueble}><lightning-icon icon-name="custom:custom85" size="large"></lightning-icon><span class="btn-text">Nuevo Inmueble</span></button>
            </div>
            <div class="slds-col slds-p-bottom_medium">
                <button class="btn-lanzadera" onclick={navNuevoEncargo}><lightning-icon icon-name="standard:opportunity" size="large"></lightning-icon><span class="btn-text">Nuevo Encargo</span></button>
            </div>
            <div class="slds-col slds-p-bottom_medium">
                <button class="btn-lanzadera" onclick={navNuevoDemanda}><lightning-icon icon-name="custom:custom15" size="large"></lightning-icon><span class="btn-text">Nueva Demanda</span></button>
            </div>
            <div class="slds-col slds-p-bottom_medium">
                <button class="btn-lanzadera" onclick={navNuevaNoticia}><lightning-icon icon-name="custom:custom67" size="large"></lightning-icon><span class="btn-text">Nueva Noticia</span></button>
            </div>
        </div>

        <div class="slds-m-top_large slds-p-top_medium slds-border_top">
            
            <h2 class="slds-text-heading_small slds-m-bottom_medium slds-text-color_error slds-p-left_small">
                <lightning-icon icon-name="utility:warning" size="small" variant="error" class="slds-m-right_x-small"></lightning-icon>
                <strong>Atención Requerida</strong>
            </h2>

            <div class="slds-m-bottom_medium slds-p-horizontal_small">
                <div class="slds-media slds-media_center slds-m-bottom_small">
                    <div class="slds-media__figure"><lightning-icon icon-name="standard:opportunity" size="small"></lightning-icon></div>
                    <div class="slds-media__body"><h3 class="slds-text-heading_small slds-text-color_weak"><strong>Encargos Activos</strong></h3></div>
                </div>
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaEncargosSinCruces}>
                            <span class="slds-badge slds-theme_error slds-m-right_small">{contadorSinCruces}</span>Encargos sin buscar cruces
                        </button>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaEncargosPendientes}>
                            <span class="slds-badge slds-theme_warning slds-m-right_small">{contadorPendientes}</span>Encargos con cruces sin revisar
                        </button>
                    </div>
                </div>

                <template if:true={mostrarTablaEncargos}>
                    <div class="slds-m-top_medium slds-p-around_small slds-box slds-theme_default">
                        <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">
                            Mostrando: <strong>{tituloTabla}</strong>
                        </div>
                        <div style="height: 200px;">
                            <lightning-datatable key-field="Id" data={datosTablaActual} columns={columnasActuales} hide-checkbox-column onrowaction={handleRowAction}></lightning-datatable>
                        </div>
                    </div>
                </template>
            </div>

            <div class="slds-m-bottom_medium slds-p-horizontal_small slds-m-top_large">
                <div class="slds-media slds-media_center slds-m-bottom_small">
                    <div class="slds-media__figure"><lightning-icon icon-name="custom:custom15" size="small"></lightning-icon></div>
                    <div class="slds-media__body"><h3 class="slds-text-heading_small slds-text-color_weak"><strong>Demandas Activas</strong></h3></div>
                </div>
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaDemandasSinCruces}>
                            <span class="slds-badge slds-theme_error slds-m-right_small">{contadorDemandasSinCruces}</span>Demandas sin buscar cruces
                        </button>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaDemandasPendientes}>
                            <span class="slds-badge slds-theme_warning slds-m-right_small">{contadorDemandasPendientes}</span>Demandas con cruces sin revisar
                        </button>
                    </div>
                </div>

                <template if:true={mostrarTablaDemandas}>
                    <div class="slds-m-top_medium slds-p-around_small slds-box slds-theme_default">
                        <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">
                            Mostrando: <strong>{tituloTabla}</strong>
                        </div>
                        <div style="height: 200px;">
                            <lightning-datatable key-field="Id" data={datosTablaActual} columns={columnasActuales} hide-checkbox-column onrowaction={handleRowAction}></lightning-datatable>
                        </div>
                    </div>
                </template>
            </div>

            <div class="slds-m-bottom_medium slds-p-horizontal_small slds-m-top_large">
                <div class="slds-media slds-media_center slds-m-bottom_small">
                    <div class="slds-media__figure"><lightning-icon icon-name="custom:custom67" size="small"></lightning-icon></div>
                    <div class="slds-media__body"><h3 class="slds-text-heading_small slds-text-color_weak"><strong>Noticias y Captaciones</strong></h3></div>
                </div>
                <div class="slds-grid slds-gutters">
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaNoticiasVencidas}>
                            <span class="slds-badge slds-theme_error slds-m-right_small">{contadorNoticiasVencidas}</span>Seguimientos Vencidos
                        </button>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <button class="slds-button slds-button_outline-brand slds-button_stretch slds-p-vertical_xxx-small" onclick={toggleTablaNoticiasNuevas}>
                            <span class="slds-badge slds-theme_warning slds-m-right_small">{contadorNoticiasNuevas}</span>Pistas por investigar
                        </button>
                    </div>
                </div>

                <template if:true={mostrarTablaNoticias}>
                    <div class="slds-m-top_medium slds-p-around_small slds-box slds-theme_default">
                        <div class="slds-text-title_caps slds-m-bottom_small slds-text-color_weak">
                            Mostrando: <strong>{tituloTabla}</strong>
                        </div>
                        <div style="height: 200px;">
                            <lightning-datatable key-field="Id" data={datosTablaActual} columns={columnasActuales} hide-checkbox-column onrowaction={handleRowAction}></lightning-datatable>
                        </div>
                    </div>
                </template>
            </div>
            
        </div>
    </lightning-card>
</template>
