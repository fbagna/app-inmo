<template>
    <lightning-card title="Compatible Requests (Matchmaking Engine)" icon-name="standard:flow">
        
        <div slot="actions">
            <lightning-button label="Propose Listing" variant="brand" onclick={handlePropose} disabled={isButtonDisabled}></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <div class="slds-box slds-m-bottom_medium slds-theme_shade slds-p-around_small">
                
                <div class="slds-m-bottom_small">
                    <span class="slds-text-title_caps slds-text-color_weak">Adjust Search Filters</span>
                </div>

                <lightning-layout multiple-rows>
                    
                    <lightning-layout-item size="12" medium-device-size="4" padding="horizontal-small">
                        <lightning-combobox name="filterOperation" label="Operation Type" value={filterOperation} options={operationOptions} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-combobox>
                        <lightning-input type="number" name="filterMinBudget" label="Min Client Budget" value={filterMinBudget} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-input>
                        <lightning-input type="number" name="filterMaxBudget" label="Max Client Budget" value={filterMaxBudget} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-input>
                    </lightning-layout-item>
                    
                    <lightning-layout-item size="12" medium-device-size="4" padding="horizontal-small">
                        <lightning-combobox name="filterProvince" label="State/Province" value={filterProvince} options={provinceOptions} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-combobox>
                        <lightning-combobox name="filterCity" label="City" value={filterCity} options={cityOptions} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-combobox>
                        <lightning-combobox name="filterNeighborhood" label="Neighborhood" value={filterNeighborhood} options={neighborhoodOptions} onchange={handleFilterChange} disabled={isNeighborhoodDisabled} class="slds-m-bottom_x-small"></lightning-combobox>
                    </lightning-layout-item>

                    <lightning-layout-item size="12" medium-device-size="4" padding="horizontal-small">
                        <lightning-input type="number" name="filterSquareMeters" label="Max Client Sq Meters" value={filterSquareMeters} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-input>
                        <lightning-input type="number" name="filterBedrooms" label="Max Client Bedrooms" value={filterBedrooms} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-input>
                        <lightning-input type="number" name="filterBathrooms" label="Max Client Bathrooms" value={filterBathrooms} onchange={handleFilterChange} class="slds-m-bottom_x-small"></lightning-input>
                        <div class="slds-m-top_medium">
                            <lightning-input type="checkbox" name="filterElevator" label="Requires Elevator" checked={filterElevator} onchange={handleFilterChange}></lightning-input>
                        </div>
                    </lightning-layout-item>

                </lightning-layout>
            </div>

            <template if:true={hasData}>
                <lightning-datatable key-field="Id" data={requests} columns={columns} onrowselection={handleRowSelection}></lightning-datatable>
            </template>

            <template if:false={hasData}>
                <template if:true={isLoading}><lightning-spinner alternative-text="Loading..." size="small"></lightning-spinner></template>
                <template if:false={isLoading}>
                    <div class="slds-illustration slds-illustration_small slds-m-vertical_medium" aria-hidden="true">
                        <div class="slds-text-longform text-center">
                            <h3 class="slds-text-heading_small">No compatible requests found</h3>
                            <p class="slds-text-body_regular">All clients have already been proposed, or the filters are too strict.</p>
                        </div>
                    </div>
                </template>
            </template>

            <div class="slds-m-top_x-large slds-border_top slds-p-top_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium slds-text-color_default slds-font-weight_bold">
                    <lightning-icon icon-name="standard:task" size="small" class="slds-m-right_x-small"></lightning-icon>
                    Active Proposals (Matches)
                </h2>
                <template if:true={hasMatches}>
                    <lightning-datatable key-field="Id" data={matches} columns={columnsMatches} hide-checkbox-column="true"></lightning-datatable>
                </template>
                <template if:false={hasMatches}>
                     <p class="slds-text-color_weak slds-m-left_large slds-text-body_small">No proposals have been made for this listing yet.</p>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
