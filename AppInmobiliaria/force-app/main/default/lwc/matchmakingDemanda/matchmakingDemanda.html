<template>
    <lightning-card title="Inmuebles Compatibles (Búsqueda)" icon-name="standard:home">
        
        <div slot="actions">
            <lightning-button label="Sugerir Inmuebles" variant="brand" onclick={handleProponer} disabled={isButtonDisabled}></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <div class="slds-box slds-m-bottom_medium slds-theme_shade slds-p-around_small">
                <lightning-layout multiple-rows vertical-align="end">
                    
                    <lightning-layout-item size="12" class="slds-m-bottom_x-small">
                        <span class="slds-text-title_caps slds-text-color_weak">Filtros (Basados en el Cliente)</span>
                    </lightning-layout-item>
                    
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-combobox name="filtroOperacion" label="Operación" value={filtroOperacion} options={opcionesOperacion} onchange={handleFilterChange}></lightning-combobox>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-input type="number" name="filtroPresupuesto" label="Presupuesto Máx" value={filtroPresupuesto} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-input type="number" name="filtroHabitaciones" label="Hab. Mínimas" value={filtroHabitaciones} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-input type="number" name="filtroBanos" label="Baños Mínimos" value={filtroBanos} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-input type="number" name="filtroMetros" label="M2 Mínimos" value={filtroMetros} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small">
                        <lightning-combobox name="filtroProvincia" label="Provincia" value={filtroProvincia} options={opcionesProvincia} onchange={handleFilterChange}></lightning-combobox>
                    </lightning-layout-item>
                    
                    <lightning-layout-item size="12" medium-device-size="6" padding="horizontal-small" class="slds-p-bottom_x-small slds-m-top_small">
                        <lightning-input type="checkbox" name="filtroAscensor" label="Requiere Ascensor" checked={filtroAscensor} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>

                </lightning-layout>
            </div>

            <template if:true={hasData}>
                <lightning-datatable key-field="Id" data={encargos} columns={columns} onrowselection={handleRowSelection}></lightning-datatable>
            </template>

            <template if:false={hasData}>
                <template if:true={isLoading}><lightning-spinner size="small"></lightning-spinner></template>
                <template if:false={isLoading}>
                    <div class="slds-illustration slds-illustration_small slds-m-vertical_medium">
                        <div class="slds-text-longform text-center">
                            <h3 class="slds-text-heading_small">No hay inmuebles que encajen</h3>
                            <p class="slds-text-body_regular">Prueba a aumentar el presupuesto o reducir exigencias.</p>
                        </div>
                    </div>
                </template>
            </template>

            <div class="slds-m-top_x-large slds-border_top slds-p-top_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium slds-font-weight_bold">
                    <lightning-icon icon-name="standard:task" size="small" class="slds-m-right_x-small"></lightning-icon>
                    Inmuebles ya propuestos a este cliente
                </h2>
                <template if:true={hasCruces}>
                    <lightning-datatable key-field="Id" data={cruces} columns={columnsCruces} hide-checkbox-column="true"></lightning-datatable>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
