<template>
    <lightning-modal-header title={labels.modalTitle}></lightning-modal-header>
    
    <lightning-modal-body style="position: relative; min-height: 250px;">
        <lightning-record-edit-form 
            object-api-name="gbcinmo__Property__c" 
            onload={handleFormLoaded}
            onsubmit={handleSubmit} 
            onsuccess={handleSuccess} 
            onerror={handleError}>
            
            <template if:false={isFormReady}>
                <div class="slds-align_absolute-center" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100;">
                    <lightning-spinner alternative-text="Loading form elements..." size="medium"></lightning-spinner>
                </div>
            </template>

            <div class={computedGridClass}>
                
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <lightning-input-field field-name="Name" required></lightning-input-field>
                </div>

                <div class="slds-col slds-size_1-of-1">
                    <c-location-selector></c-location-selector>
                </div>
                
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <label class="slds-form-element__label"><abbr class="slds-required" title="required">*</abbr>{labels.addressLabel}</label>
                    <lightning-input-field field-name="gbcinmo__Street__c" variant="label-hidden" required></lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input-field field-name="gbcinmo__Postal_Code__c"></lightning-input-field>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-m-top_medium slds-m-bottom_small">
                    <h3 class="slds-text-heading_small slds-border_bottom slds-p-bottom_x-small">{labels.sectionSpecs}</h3>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <template if:false={isQuickAddDoorman}>
                        <lightning-input-field field-name="gbcinmo__Doorman__c"></lightning-input-field>
                        <div class="slds-text-align_right slds-p-top_xxx-small">
                            <a onclick={toggleDoormanMode} class="slds-text-link_reset slds-text-link" style="font-size: 12px; font-weight: 600;">{labels.quickAddLink}</a>
                        </div>
                    </template>
                    
                    <template if:true={isQuickAddDoorman}>
                        <div class="slds-box slds-theme_shade slds-p-around_small slds-m-bottom_x-small" style="border-left: 3px solid #0176d3;">
                            <div class="slds-text-title_caps slds-m-bottom_x-small" style="font-weight: 700; color: #0176d3;">{labels.quickAddHeader}</div>
                            <lightning-input label={labels.firstNameLabel} data-id="doormanFirst" class="slds-m-bottom_xxx-small"></lightning-input>
                            <lightning-input label={labels.lastNameLabel} required data-id="doormanLast" class="slds-m-bottom_xxx-small"></lightning-input>
                            <div class="slds-text-align_right slds-m-top_x-small">
                                <a onclick={toggleDoormanMode} class="slds-text-color_error" style="font-size: 12px; font-weight: 600;">{labels.cancelLink}</a>
                            </div>
                        </div>
                    </template>
                </div>
                
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_small">
                    <lightning-input-field field-name="gbcinmo__Has_Elevator__c"></lightning-input-field>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-m-top_small slds-m-bottom_medium">
                    <lightning-input-field field-name="gbcinmo__Comments__c"></lightning-input-field>
                </div>
            </div>

            <div class="slds-modal__footer slds-size_1-of-1 slds-p-around_small slds-align_absolute-center" style="position: sticky; bottom: 0; background: white; z-index: 10;">
                <lightning-button 
                    label={labels.btnCancel} 
                    onclick={handleCancel} 
                    class="slds-m-right_small">
                </lightning-button>
                <lightning-button 
                    variant="brand" 
                    type="submit"
                    label={labels.btnSave} 
                    icon-name="utility:save">
                </lightning-button>
            </div>

        </lightning-record-edit-form>
    </lightning-modal-body>
</template>
