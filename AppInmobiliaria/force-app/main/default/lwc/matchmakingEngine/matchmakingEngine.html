<template>
    <lightning-card title="Interesados Compatibles (Motor Matchmaking)" icon-name="standard:flow">
        
        <div slot="actions">
            <lightning-button label="Proponer Inmueble" variant="brand" onclick={handleProponer} disabled={isButtonDisabled}></lightning-button>
        </div>

        <div class="slds-p-around_medium">
            
            <!-- Barra de Filtros Flexibles Mejorada -->
            <div class="slds-box slds-m-bottom_medium slds-theme_shade slds-p-around_small">
                <lightning-layout multiple-rows vertical-align="end">
                    <lightning-layout-item size="12" class="slds-m-bottom_x-small">
                        <span class="slds-text-title_caps slds-text-color_weak">Ajustar Filtros de Búsqueda</span>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small">
                        <lightning-combobox name="filtroOperacion" label="Operación" value={filtroOperacion} options={opcionesOperacion} onchange={handleFilterChange}></lightning-combobox>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small">
                        <lightning-input type="number" name="filtroPresupuesto" label="Presupuesto Mínimo" value={filtroPresupuesto} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small">
                        <lightning-input type="number" name="filtroHabitaciones" label="Hab. Máximas" value={filtroHabitaciones} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small">
                        <lightning-input type="number" name="filtroBanos" label="Baños Máximos" value={filtroBanos} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small">
                        <lightning-combobox name="filtroProvincia" label="Provincia" value={filtroProvincia} options={opcionesProvincia} onchange={handleFilterChange}></lightning-combobox>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" sm="2" padding="horizontal-small" class="slds-p-bottom_x-small">
                        <lightning-input type="checkbox" name="filtroAscensor" label="Requiere Ascensor" checked={filtroAscensor} onchange={handleFilterChange}></lightning-input>
                    </lightning-layout-item>
                </lightning-layout>
            </div>

            <!-- Tablas de Resultados (Sin cambios en HTML) -->
            <template if:true={hasData}>
                <lightning-datatable key-field="Id" data={demandas} columns={columns} onrowselection={handleRowSelection}></lightning-datatable>
            </template>

            <template if:false={hasData}>
                <template if:true={isLoading}><lightning-spinner alternative-text="Cargando..." size="small"></lightning-spinner></template>
                <template if:false={isLoading}>
                    <div class="slds-illustration slds-illustration_small slds-m-vertical_medium" aria-hidden="true">
                        <div class="slds-text-longform text-center">
                            <h3 class="slds-text-heading_small">No hay nuevos interesados compatibles</h3>
                            <p class="slds-text-body_regular">Todos los clientes ya han sido propuestos o los filtros son muy estrictos.</p>
                        </div>
                    </div>
                </template>
            </template>

            <div class="slds-m-top_x-large slds-border_top slds-p-top_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium slds-text-color_default slds-font-weight_bold">
                    <lightning-icon icon-name="standard:task" size="small" class="slds-m-right_x-small"></lightning-icon>
                    Propuestas Realizadas (Cruces Activos)
                </h2>
                
                <template if:true={hasCruces}>
                    <lightning-datatable key-field="Id" data={cruces} columns={columnsCruces} hide-checkbox-column="true"></lightning-datatable>
                </template>
                <template if:false={hasCruces}>
                     <p class="slds-text-color_weak slds-m-left_large slds-text-body_small">No hay propuestas realizadas aún para este inmueble.</p>
                </template>
            </div>
        </div>
    </lightning-card>
</template>
